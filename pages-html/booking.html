<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="xlTPzs3lMkDTd1Yaj7jXr5l9duvF9xIBMPgRqw4Qc0Y" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book skilled remote professionals for your tasks and projects. Get matched with qualified talent within 24-48 hours through Assistora's simple booking process.">
    <meta name="keywords" content="book remote professionals, hire freelancers, task booking, virtual assistant services, remote hiring, professional staffing, get matched">
    <title>Assistora | Booking</title>
    <link rel="preload" href="/section-css/header.css" as="style">
    <link rel="stylesheet" href="/section-css/header.css">
    <link rel="stylesheet" href="/section-css/footer.css">
    <link rel="stylesheet" href="/pages-css/booking.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.webp">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.webp">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.webp">
    <link rel="manifest" href="/assets/site.webmanifest">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Bungee&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.js" defer></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BLVQGYQ0QK"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <div class="header-container">
        <section id="header" class="section"></section>
    </div>
    <div class="booking-container">
        <div class="page-title">
            <h1>Get the Right Talent for Your Task</h1>
            <p>Tell us what you need, and we’ll match you with a skilled professional within 24–48 hours.</p>
        </div>
        <div class="form-container">
            <form id="bookingForm" novalidate>
                <input type="text" id="website" style="display:none">
                <div class="steps">
                  <span class="step active">1</span>
                  <span class="step">2</span>
                  <span class="step">3</span>
                </div>
                <div class="form-step active">
                  <h2>Client Information</h2>
                <div class="input-group">
                  <input type="text" id="name" placeholder="Full Name" required>
                  <label for="name">Full Name</label>
                </div>
                <div class="input-group">
                  <input type="email" id="email" placeholder="Email Address" required>
                  <label for="email">Email Address</label>
                </div> 
                <div class="input-group">
                  <input type="text" id="company" placeholder="Company Name">
                  <label for="company">Company Name</label>
                </div>
                  <button id="next1">Next →</button>
                </div>
                <div class="form-step">
                  <h2>Project Details</h2>
                <div class="select-wrapper">
                  <select id="service" required>
                    <option value="">Select Service</option>
                    <option>Virtual Assistant</option>
                    <option>Graphic Design</option>
                    <option>Web Development</option>
                    <option >Others</option>
                  </select>
                 </div>          
                <div class="input-group">
                  <textarea id="details" placeholder="Describe your project" required></textarea>
                  <label for="details">Describe your project</label>
                </div>
                <div class="button-group">
                  <button type="button" id="back1">← Back</button>
                  <button type="button" id="next2">Next →</button>
                </div>
                </div>
                <div class="form-step">
                  <h2>Budget & Deadline</h2>
                <div class="budget-group">
                  <div class="input-group">
                    <input type="number" id="budgetMin" placeholder="Minimum Budget" required>
                    <label for="budgetMin">Minimum Budget</label>
                  </div>
                  <div class="input-group">
                    <input type="number" id="budgetMax" placeholder="Maximum Budget" required>
                    <label for="budgetMax">Maximum Budget</label>
                  </div>
                </div>
                <div class="input-group">
                  <input type="date" id="deadline" required>
                  <label for="deadline">Deadline</label>
                </div>
                  <button type="button" id="back2">← Back</button>
                  <div class="g-recaptcha" data-sitekey="6LdHI50sAAAAAN45tMvWCg-xr4PmhrZMEbFz4M1x"></div>
                  <button type="submit">Submit</button>
                </div>
            </form>
        </div>
    </div>
    <footer>
      <section id="footer" class="section"></section>
    </footer>  
    <script src="/scripts/header.js" defer></script>
    <script src="/scripts/router.js" defer></script>
    <script src="/scripts/components.js" defer></script>
    <script type="module" src="/scripts/booking.js" defer></script>
         <script src="/scripts/analytics.js" defer></script>
</body>
</html>
